<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аквагрин — Расчёт стоимости газона</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:#f0f7f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}

  .quiz-wrap{width:100%;max-width:560px;}

  /* CARD */
  .card{background:#fff;border-radius:24px;padding:36px 32px;box-shadow:0 8px 40px rgba(30,100,30,.13);position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,#b6f0b0 0%,transparent 70%);pointer-events:none;}

  /* PROGRESS */
  .progress-wrap{margin-bottom:28px;}
  .progress-label{display:flex;justify-content:space-between;font-size:13px;color:#7aaa6a;font-weight:600;margin-bottom:8px;}
  .progress-bar{height:6px;background:#e0f0dc;border-radius:99px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,#3db53d,#6dd96d);border-radius:99px;transition:width .4s ease;}

  /* WELCOME */
  .welcome-icon{font-size:56px;text-align:center;margin-bottom:16px;}
  .welcome-title{font-size:26px;font-weight:800;color:#1a4a1a;text-align:center;line-height:1.3;margin-bottom:12px;}
  .welcome-sub{font-size:15px;color:#4a7a4a;text-align:center;line-height:1.6;margin-bottom:28px;}
  .badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
  .badge{background:#e8f7e4;color:#2e7d32;font-size:12px;font-weight:600;padding:6px 14px;border-radius:99px;}

  /* QUESTION */
  .q-num{font-size:12px;font-weight:700;color:#8aba80;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
  .q-text{font-size:20px;font-weight:700;color:#1a4a1a;line-height:1.4;margin-bottom:24px;}

  /* OPTIONS */
  .options{display:flex;flex-direction:column;gap:10px;}
  .opt{display:flex;align-items:center;gap:14px;padding:14px 18px;border:2px solid #d8edd4;border-radius:14px;cursor:pointer;transition:all .2s;background:#fff;}
  .opt:hover{border-color:#3db53d;background:#f2fbf0;}
  .opt.selected{border-color:#3db53d;background:#e8f7e4;}
  .opt-icon{font-size:22px;flex-shrink:0;}
  .opt-text{font-size:15px;font-weight:500;color:#1a4a1a;}

  /* CONTACT FORM */
  .form-title{font-size:22px;font-weight:800;color:#1a4a1a;margin-bottom:8px;}
  .form-sub{font-size:14px;color:#5a8a5a;margin-bottom:24px;line-height:1.6;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;font-weight:600;color:#3a6a3a;margin-bottom:6px;}
  .field input{width:100%;padding:13px 16px;border:2px solid #d8edd4;border-radius:12px;font-size:15px;font-family:'Inter',sans-serif;color:#1a4a1a;outline:none;transition:border-color .2s;}
  .field input:focus{border-color:#3db53d;}

  /* contact chips */
  .contact-chips{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;}
  .contact-chip{background:#f0f7ec;border:2px solid #d8edd4;border-radius:40px;padding:10px 20px;font-size:15px;font-weight:600;color:#1a4a1a;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
  .contact-chip:hover{background:#e0f0da;border-color:#3db53d;transform:translateY(-1px);}
  .contact-chip:active{transform:scale(.97);}

  .privacy{font-size:12px;color:#9ab89a;margin-bottom:20px;line-height:1.5;}

  /* BUTTONS */
  .btn-main{width:100%;padding:16px;background:linear-gradient(135deg,#2e9e2e,#56cc56);color:#fff;font-size:17px;font-weight:700;border:none;border-radius:14px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 20px rgba(46,158,46,.35);}
  .btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(46,158,46,.45);}
  .btn-main:active{transform:scale(.98);}
  .btn-back{background:none;border:none;color:#7aaa6a;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px;display:block;text-align:center;width:100%;}
  .btn-back:hover{color:#3db53d;}

  /* RESULT */
  .result-icon{font-size:64px;text-align:center;margin-bottom:16px;}
  .result-title{font-size:26px;font-weight:800;color:#1a4a1a;text-align:center;margin-bottom:12px;}
  .result-sub{font-size:15px;color:#4a7a4a;text-align:center;line-height:1.7;margin-bottom:28px;}
  .result-items{background:#f2fbf0;border-radius:16px;padding:20px;margin-bottom:24px;}
  .result-item{display:flex;align-items:center;gap:10px;font-size:14px;color:#2e6e2e;font-weight:500;padding:6px 0;}
  .result-item::before{content:'✓';color:#3db53d;font-weight:800;font-size:16px;}

  /* ANIM */
  .slide{animation:slideIn .35s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="quiz-wrap">
<div class="card" id="card">
  <!-- content injected by JS -->
</div>
</div>

<script>
const questions = [
  {
    icon: "🏡",
    text: "У вас загородный дом или дача?",
    opts: [
      {icon:"🏠", text:"Загородный дом"},
      {icon:"🌿", text:"Дача"},
      {icon:"🏢", text:"Коммерческий объект"},
      {icon:"📋", text:"Только планирую участок"}
    ]
  },
  {
    icon: "🌱",
    text: "Какой газон вы хотите получить?",
    opts: [
      {icon:"⚽", text:"Спортивный — выдерживает нагрузки"},
      {icon:"🌳", text:"Универсальный — красивый и практичный"},
      {icon:"💐", text:"Партерный — максимально декоративный"},
      {icon:"💡", text:"Пока не знаю, хочу рекомендацию"}
    ]
  },
  {
    icon: "🔧",
    text: "Участок уже подготовлен или требуется подготовка?",
    opts: [
      {icon:"✅", text:"Полностью подготовлен"},
      {icon:"🔨", text:"Требуется частичная подготовка"},
      {icon:"🏗️", text:"Требуется полная подготовка"},
      {icon:"🔍", text:"Не знаю, нужен осмотр"}
    ]
  },
  {
    icon: "📐",
    text: "Какая площадь будущего газона?",
    opts: [
      {icon:"🟩", text:"До 2 соток"},
      {icon:"🟩🟩", text:"2–5 соток"},
      {icon:"🌄", text:"5–10 соток"},
      {icon:"🗺️", text:"Более 10 соток"}
    ]
  },
  {
    icon: "📅",
    text: "Как скоро вы планируете сделать газон?",
    opts: [
      {icon:"🔥", text:"В ближайшие 7 дней"},
      {icon:"📆", text:"В течение месяца"},
      {icon:"🗓️", text:"Через 1–3 месяца"},
      {icon:"👀", text:"Пока присматриваюсь"}
    ]
  },
  {
    icon: "➕",
    text: "Потребуются ли дополнительные услуги?",
    opts: [
      {icon:"💧", text:"Автополив"},
      {icon:"🌿", text:"Посадка кустарников"},
      {icon:"🌸", text:"Устройство клумб"},
      {icon:"🤷", text:"Пока не знаю"}
    ]
  },
  {
    icon: "🎯",
    text: "Хотите получить точный расчёт стоимости и рекомендации?",
    opts: [
      {icon:"📊", text:"Да, хочу расчёт и консультацию"},
      {icon:"🧮", text:"Только расчёт"},
      {icon:"💬", text:"Только консультацию"},
      {icon:"📖", text:"Пока изучаю"}
    ]
  }
];

let step = 0; // 0=welcome, 1..7=questions, 8=contacts, 9=result
let answers = [];
const total = questions.length;

// вспомогательная функция отправки данных в MAX API
async function sendToMaxAPI(name, phone, answers, actionType = "quiz") {
  const payload = {
    chat_id: "8755559", // MAX chat ID из настроек
    text: `🎯 Новая заявка из квиза!\n\n👤 Имя: ${name}\n📱 Телефон: ${phone}\n🎯 Действие: ${actionType}\n\n📊 Ответы на вопросы:\n${answers.map((answer, index) => `${index + 1}. ${answer.question}\n   → ${answer.answer}`).join('\n\n')}\n\n💬 Источник: Квиз Аквагрин`,
    parse_mode: "HTML"
  };

  try {
    const response = await fetch('https://platform-api.max.ru/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer YOUR_MAX_API_TOKEN' // Замените на реальный токен
      },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      console.log('✅ Данные успешно отправлены в MAX');
      return true;
    } else {
      console.error('❌ Ошибка отправки в MAX:', response.status);
      return false;
    }
  } catch (error) {
    console.error('❌ Ошибка сети при отправке в MAX:', error);
    return false;
  }
}

// вспомогательная функция отправки данных (имитация + лог, можно заменить на реальный API)
function sendUserData(name, phone, actionType = "form") {
  const answersData = answers.map((idx, qIndex) => ({
    question: questions[qIndex].text,
    answer: idx !== undefined ? questions[qIndex].opts[idx]?.text : "не выбран"
  }));

  console.log("📨 Данные отправлены (лог):", { name, phone, answers: answersData, action: actionType });

  // Отправка в MAX API
  sendToMaxAPI(name, phone, answersData, actionType);

  return true;
}

function render() {
  const card = document.getElementById('card');
  card.innerHTML = '';
  let html = '<div class="slide">';

  if (step === 0) {
    html += `
      <div class="welcome-icon">🌿</div>
      <div class="welcome-title">Получите точный расчёт стоимости гидропосева газона Аквагрин</div>
      <div class="welcome-sub">Ответьте на 7 коротких вопросов — и мы подготовим персональный расчёт + рекомендации по вашему участку</div>
      <div class="badges">
        <span class="badge">⚡ Занимает 2 минуты</span>
        <span class="badge">🎁 Бесплатный расчёт</span>
        <span class="badge">📞 Без навязывания</span>
      </div>
      <button class="btn-main" onclick="nextStep()">Начать →</button>
    `;
  } else if (step >= 1 && step <= total) {
    const q = questions[step - 1];
    const pct = Math.round(((step - 1) / total) * 100);
    html += `
      <div class="progress-wrap">
        <div class="progress-label"><span>Прогресс</span><span>${step} из ${total}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="q-num">Вопрос ${step}</div>
      <div class="q-text">${q.icon} ${q.text}</div>
      <div class="options">
    `;
    q.opts.forEach((o, i) => {
      const sel = answers[step-1] === i ? ' selected' : '';
      html += `<div class="opt${sel}" onclick="selectOpt(${i})"><span class="opt-icon">${o.icon}</span><span class="opt-text">${o.text}</span></div>`;
    });
    html += `</div>`;
    if (step > 1) html += `<button class="btn-back" onclick="prevStep()">← Назад</button>`;
  } else if (step === total + 1) {
    // форма контактов с кнопками MAX, Telegram, Звонок
    html += `
      <div class="form-title">🎉 Почти готово!</div>
      <div class="form-sub">Мы подготовим персональный расчёт стоимости и свяжемся с вами в ближайшее время</div>
      <div class="field"><label>Ваше имя</label><input type="text" id="f-name" placeholder="Иван"></div>
      <div class="field"><label>Телефон</label><input type="tel" id="f-phone" placeholder="+7 (___) ___-__-__"></div>
      <div class="contact-chips" id="contactChips">
        <div class="contact-chip" data-action="max">💬 MAX</div>
        <div class="contact-chip" data-action="telegram">📱 Telegram</div>
        <div class="contact-chip" data-action="call">📞 Звонок</div>
      </div>
      <div class="privacy">Нажимая на кнопку связи или «Получить расчёт», вы соглашаетесь на обработку персональных данных. Мы не передаём данные третьим лицам.</div>
      <button class="btn-main" id="submitBtn">Получить расчёт →</button>
      <button class="btn-back" onclick="prevStep()">← Назад к вопросам</button>
    `;
  } else if (step === total + 2) {
    html += `
      <div class="result-icon">🌿</div>
      <div class="result-title">Спасибо! Заявка принята</div>
      <div class="result-sub">Наш специалист свяжется с вами в течение 15 минут и подготовит персональный расчёт стоимости гидропосева</div>
      <div class="result-items">
        <div class="result-item">Бесплатный выезд на объект</div>
        <div class="result-item">Точный расчёт по вашей площади</div>
        <div class="result-item">Рекомендации по типу газона</div>
        <div class="result-item">Гарантия результата Аквагрин</div>
      </div>
      <button class="btn-main" onclick="window.location.href='tel:+79125893009'">📞 Позвонить сейчас</button>
    `;
  }

  html += '</div>';
  card.innerHTML = html;

  // Добавляем обработчики для кнопок MAX, Telegram, Звонок, если мы на шаге контактов
  if (step === total + 1) {
    const nameInput = document.getElementById('f-name');
    const phoneInput = document.getElementById('f-phone');
    // Форматирование телефона
    if (phoneInput) {
      phoneInput.addEventListener('input', function(e) {
        let val = e.target.value.replace(/\D/g, '');
        if (val.length > 11) val = val.slice(0,11);
        let formatted = '+7';
        if (val.length > 1) formatted += ' (' + val.slice(1,4);
        if (val.length >= 5) formatted += ') ' + val.slice(4,7);
        if (val.length >= 8) formatted += '-' + val.slice(7,9);
        if (val.length >= 10) formatted += '-' + val.slice(9,11);
        e.target.value = formatted;
      });
    }

    // Функция валидации и отправки
    function validateAndGetData() {
      const name = nameInput.value.trim();
      let phone = phoneInput.value.trim();
      if (!name) { alert('Пожалуйста, укажите ваше имя'); return null; }
      const phoneDigits = phone.replace(/\D/g, '');
      if (phoneDigits.length < 10) { alert('Введите корректный номер телефона'); return null; }
      return { name, phone };
    }

    // обработчики для кнопок связи
    const maxChip = document.querySelector('.contact-chip[data-action="max"]');
    const tgChip = document.querySelector('.contact-chip[data-action="telegram"]');
    const callChip = document.querySelector('.contact-chip[data-action="call"]');

    if (maxChip) {
      maxChip.addEventListener('click', () => {
        const data = validateAndGetData();
        if (!data) return;
        sendUserData(data.name, data.phone, 'max_chat');
        window.location.href = 'https://max.ru/id5905056440_1_bot';
      });
    }
    if (tgChip) {
      tgChip.addEventListener('click', () => {
        const data = validateAndGetData();
        if (!data) return;
        sendUserData(data.name, data.phone, 'telegram');
        window.location.href = 'https://max.ru/id5905056440_1_bot'; // Исправлено на MAX
      });
    }
    if (callChip) {
      callChip.addEventListener('click', () => {
        const data = validateAndGetData();
        if (!data) return;
        sendUserData(data.name, data.phone, 'phone_call');
        window.location.href = 'tel:+79125893009';
      });
    }

    // кнопка "Получить расчёт" — просто переход к результату без перехода по ссылке
    const submitBtn = document.getElementById('submitBtn');
    if (submitBtn) {
      submitBtn.addEventListener('click', () => {
        const data = validateAndGetData();
        if (!data) return;
        sendUserData(data.name, data.phone, 'form_submit');
        step = total + 2;
        render();
      });
    }
  }
}

function nextStep() {
  step++;
  render();
}
function prevStep() {
  step--;
  render();
}
function selectOpt(i) {
  answers[step - 1] = i;
  setTimeout(() => { step++; render(); }, 220);
}

render();
</script>
</body>
</html>
